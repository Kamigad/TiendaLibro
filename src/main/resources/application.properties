spring.application.name=tienda_libros
#Conexion mysql
spring.datasource.url=jdbc:mysql://localhost:3306/tienda_libros_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#Crear la base de datos en caso necesario
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#Disminuir la informacion proporcionada en la consola
logging.level.root=INFO
logging.pattern.console=[%thread] %-5level: %logger - %msg%n